<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generador de Certificados</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <br>
    <div class="d-flex justify-content-end mb-3">
    <div class="form-check form-switch">
        <input class="form-check-input" type="checkbox" id="darkModeSwitch">
        <label class="form-check-label" for="darkModeSwitch">🌙 Modo Oscuro</label>
    </div>
</div>
<h2 class="text-center mb-4">Emisión de Certificados</h2>

<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card p-4">
                <h2 class="text-center mb-4">Emisión de Certificados</h2>
                
                <form id="formCertificados">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Seleccionar Profesores (Varios):</label>
                        <select id="selectProfesores" class="form-select" multiple="multiple" style="width: 100%">
                            </select>
                        <div class="form-text">Puedes buscar por nombre o apellido.</div>
                    </div>

                    <div class="row">
                        <div class="col-md-12 mb-3">
                            <label class="form-label fw-bold">Motivo / Evento:</label>
                            <input type="text" id="motivo" class="form-control" 
                                placeholder="Ej: Jornada de Actualización Docente"
                                onblur="this.value = capitalizarPrimeraLetra(this.value)">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Fecha de Jornada:</label>
                            <input type="date" id="fechaJornada" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Fecha de Emisión:</label>
                            <input type="date" id="fechaEmision" class="form-control">
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label fw-bold">Hora de Emisión:</label>
                            <input type="time" id="hora" class="form-control">
                        </div>
                    </div>
                    <hr>

                    <div class="d-grid gap-2">
                        <button type="button" onclick="generarPDF()" class="btn btn-primary btn-lg">
                            Generar Certificados (PDF)
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="main.js"></script>
<script src="imagenes.js"></script>
<script src="style.css"></script>

</body>
</html>
